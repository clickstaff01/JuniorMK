name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clickbroker_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/clickbroker_test
      NEXTAUTH_SECRET: ci-test-secret-not-real
      NEXTAUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_placeholder
      RESEND_FROM_EMAIL: no-reply@example.com
      UPLOADTHING_SECRET: sk_placeholder
      UPLOADTHING_APP_ID: placeholder
      CRON_SECRET: ci-cron-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations on test DB
        run: npm run db:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
